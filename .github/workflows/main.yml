name: PuterAI Gateway — Auto Restart Loop

on:
  workflow_dispatch:          # start manually from Actions tab
  push:
    branches: [ main ]

permissions:
  contents: write             # needed for pushing commits with GITHUB_TOKEN

jobs:
  run-gateway:
    runs-on: ubuntu-latest
    timeout-minutes: 360      # 6‑hour GitHub limit

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── Start bore tunnel (free, no auth) ─────────────────────────────
      - name: Start bore tunnel
        run: |
          BORE_VERSION="0.6.0"
          BORE_TAR="bore-v${BORE_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          BORE_URL="https://github.com/ekzhang/bore/releases/download/v${BORE_VERSION}/${BORE_TAR}"

          wget -q "$BORE_URL" -O "$BORE_TAR"
          tar -xzf "$BORE_TAR" bore
          chmod +x bore
          ./bore local 8000 --to bore.pub > bore.log 2>&1 &
          sleep 5

          # Extract the host only (no http://)
          BORE_HOST=$(grep -oP 'at https?://\K[^ ]+' bore.log | head -1)

          if [ -n "$BORE_HOST" ]; then
            PUBLIC_URL="http://${BORE_HOST}"
          else
            # Fallback to direct IP (likely not reachable externally)
            PUBLIC_URL="http://$(curl -s https://api.ipify.org):8000"
          fi

          echo "=========================================="
          echo "  🌐  PUBLIC URL : $PUBLIC_URL"
          echo "  🔗  Bridge     : $PUBLIC_URL/bridge"
          echo "  💬  Chat UI    : $PUBLIC_URL/chat"
          echo "  📄  API Docs   : $PUBLIC_URL/docs"
          echo "=========================================="
          echo "PUBLIC_URL=$PUBLIC_URL" >> $GITHUB_ENV

      # ── Save public URL to JSON (used by landing page) ────────────────
      - name: Save public URL to JSON
        run: |
          echo "{\"url\":\"$PUBLIC_URL\",\"timestamp\":\"$(date -u '+%Y-%m-%d %H:%M:%S UTC')\"}" > public_url.json

      # ── Update get-started.html with actual repo path ─────────────────
      - name: Fix repository placeholder in get-started.html
        run: |
          sed -i "s|YOUR_USERNAME/YOUR_REPO|${{ github.repository }}|g" get-started.html

      # ── Update README.md live server block ────────────────────────────
      - name: Update README with live server URLs
        run: |
          START="<!-- LIVE_URL_START -->"
          END="<!-- LIVE_URL_END -->"

          LIVE_BLOCK="$START
          🌐 **Live Server URL:** $PUBLIC_URL
          🔗 **Bridge:** $PUBLIC_URL/bridge
          💬 **Chat UI:** $PUBLIC_URL/chat
          📄 **API Docs:** $PUBLIC_URL/docs
          ⏱️ *Updated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')*
          $END"

          # Remove existing live block completely
          sed -i "/$START/,/$END/d" README.md
          # Append the new live block at the end of the README
          echo -e "\n$LIVE_BLOCK" >> README.md

      # ── Commit and push all changes ────────────────────────────────────
      - name: Commit updated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🌐 Update public tunnel URL, README, and get-started"
          file_pattern: 'public_url.json README.md get-started.html'

      # ── Run server with 5‑hour restart loop ───────────────────────────
      - name: Run server (5‑hour cycle)
        run: |
          RUN_SECONDS=18000   # 5 hours

          while true; do
            echo ""
            echo "▶  Starting server at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            bash run.sh &
            SERVER_PID=$!
            echo "   PID: $SERVER_PID — will restart in ${RUN_SECONDS}s"
            sleep $RUN_SECONDS

            echo "⏹  Stopping server (PID $SERVER_PID) at $(date -u)"
            kill $SERVER_PID 2>/dev/null || true
            wait $SERVER_PID 2>/dev/null || true

            echo "🔄  Restarting immediately..."
            sleep 2
          done
