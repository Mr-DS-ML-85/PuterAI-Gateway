name: PuterAI Gateway — Auto Restart Loop

on:
  workflow_dispatch:        # start manually from Actions tab
  push:
    branches: [ main ]

# ✅ Grant write permission to the default GITHUB_TOKEN
permissions:
  contents: write

jobs:
  run-gateway:
    runs-on: ubuntu-latest
    timeout-minutes: 360    # maximum 6 hours

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Start bore tunnel (free, no auth) ─────────────────────────
      - name: Start bore tunnel
        run: |
          wget -q -O bore https://github.com/ekzhang/bore/releases/latest/download/bore-x86_64-unknown-linux-musl
          chmod +x bore
          ./bore local 8000 --to bore.pub > bore.log 2>&1 &
          sleep 5
          BORE_URL=$(grep -oP 'at https?://\K[^ ]+' bore.log | head -1)
          if [ -z "$BORE_URL" ]; then
            BORE_URL="http://$(curl -s https://api.ipify.org):8000"
          fi
          echo "=========================================="
          echo "  🌐  PUBLIC URL : http://$BORE_URL"
          echo "  🔗  Bridge     : http://$BORE_URL/bridge"
          echo "  💬  Chat UI    : http://$BORE_URL/chat"
          echo "  📄  API Docs   : http://$BORE_URL/docs"
          echo "=========================================="
          echo "BORE_URL=http://$BORE_URL" >> $GITHUB_ENV

      # ── Save public URL to JSON (used by get-started.html) ───────
      - name: Save public URL to JSON
        run: |
          echo "{\"url\":\"$BORE_URL\",\"timestamp\":\"$(date -u '+%Y-%m-%d %H:%M:%S UTC')\"}" > public_url.json

      # ── Update get-started.html with actual repo path ─────────────
      - name: Fix repository placeholder in get-started.html
        run: |
          sed -i "s|YOUR_USERNAME/YOUR_REPO|${{ github.repository }}|g" get-started.html

      # ── Update README.md with live server section ──────────────────
      - name: Insert live server URL into README.md
        run: |
          # Marker sections to keep the live block updatable
          START="<!-- LIVE_URL_START -->"
          END="<!-- LIVE_URL_END -->"

          LIVE_BLOCK="🌐 **Live Server URL:** http://$BORE_URL  \n🔗 **Bridge:** http://$BORE_URL/bridge  \n💬 **Chat UI:** http://$BORE_URL/chat  \n⏱️ *Updated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')*"

          if grep -q "$START" README.md; then
            # Replace content between start and end markers
            sed -i "/$START/,/$END/c\\$START\n$LIVE_BLOCK\n$END" README.md
          else
            # Append the block at the end of the README
            echo -e "\n$START\n$LIVE_BLOCK\n$END" >> README.md
          fi

      # ── Commit & push all changes ─────────────────────────────────
      - name: Commit updated URL, HTML and README
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🌐 Update public tunnel URL, README, and get-started"
          file_pattern: 'public_url.json README.md get-started.html'
          # No github_token input needed — uses secrets.GITHUB_TOKEN automatically

      # ── Run server with 5‑hour restart loop ─────────────────────
      - name: Run server (5‑hour restart loop)
        run: |
          RUN_SECONDS=18000   # 5 hours

          while true; do
            echo ""
            echo "▶  Starting server at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            python server.py &
            SERVER_PID=$!
            echo "   PID: $SERVER_PID — will restart in ${RUN_SECONDS}s"
            sleep $RUN_SECONDS

            echo "⏹  Stopping server (PID $SERVER_PID) at $(date -u)"
            kill $SERVER_PID 2>/dev/null || true
            wait $SERVER_PID 2>/dev/null || true

            echo "🔄  Restarting immediately..."
            sleep 2
          done
