name: PuterAI Gateway — Auto Restart Loop

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  run-gateway:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── Start public tunnel via localhost.run (SSH, no binary needed) ─
      - name: Start ssh tunnel (localhost.run)
        run: |
          # Start the tunnel in the background and capture its output
          ssh -o StrictHostKeyChecking=no -R 80:localhost:8000 nokey@localhost.run > tunnel.log 2>&1 &
          # Wait a bit for the tunnel to establish
          sleep 10

          # Extract the public URL (starts with https://)
          PUBLIC_URL=$(grep -oP 'https://\S+' tunnel.log | head -1)

          # If no URL found, fallback (rare)
          if [ -z "$PUBLIC_URL" ]; then
            PUBLIC_URL="https://tunnel-not-detected.localhost.run"
          fi

          echo "=========================================="
          echo "  🌐  PUBLIC URL : $PUBLIC_URL"
          echo "  🔗  Bridge     : $PUBLIC_URL/bridge"
          echo "  💬  Chat UI    : $PUBLIC_URL/chat"
          echo "  📄  API Docs   : $PUBLIC_URL/docs"
          echo "=========================================="
          echo "PUBLIC_URL=$PUBLIC_URL" >> $GITHUB_ENV

      # ── Save public URL to JSON (used by get-started.html) ────────────
      - name: Save public URL to JSON
        run: |
          echo "{\"url\":\"$PUBLIC_URL\",\"timestamp\":\"$(date -u '+%Y-%m-%d %H:%M:%S UTC')\"}" > public_url.json

      # ── Update get-started.html with real repo path ───────────────────
      - name: Fix repository placeholder in get-started.html
        run: |
          sed -i "s|YOUR_USERNAME/YOUR_REPO|${{ github.repository }}|g" get-started.html

      # ── Update README.md live server block ────────────────────────────
      - name: Update README with live server URLs
        run: |
          START="<!-- LIVE_URL_START -->"
          END="<!-- LIVE_URL_END -->"

          # Remove any previous live block (between START and END)
          sed -i "/$START/,/$END/d" README.md

          # Append the new live block at the end of the README
          {
            echo ""
            echo "$START"
            echo "🌐 **Live Server URL:** $PUBLIC_URL  "
            echo "🔗 **Bridge:** $PUBLIC_URL/bridge  "
            echo "💬 **Chat UI:** $PUBLIC_URL/chat  "
            echo "📄 **API Docs:** $PUBLIC_URL/docs  "
            echo "⏱️ *Updated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')*  "
            echo "$END"
          } >> README.md

      # ── Commit and push all changes ────────────────────────────────────
      - name: Commit updated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🌐 Update public tunnel URL, README, and get-started"
          file_pattern: 'public_url.json README.md get-started.html'

      # ── Run server with 5‑hour restart loop ───────────────────────────
      - name: Run server (5‑hour cycle)
        run: |
          RUN_SECONDS=18000   # 5 hours

          while true; do
            echo ""
            echo "▶  Starting server at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            bash run.sh &
            SERVER_PID=$!
            echo "   PID: $SERVER_PID — will restart in ${RUN_SECONDS}s"
            sleep $RUN_SECONDS

            echo "⏹  Stopping server (PID $SERVER_PID) at $(date -u)"
            kill $SERVER_PID 2>/dev/null || true
            wait $SERVER_PID 2>/dev/null || true

            echo "🔄  Restarting immediately..."
            sleep 2
          done
